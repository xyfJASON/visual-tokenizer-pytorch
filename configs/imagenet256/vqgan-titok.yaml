seed: 8888

data:
  name: imagenet
  root: ~/data/ImageNet/ILSVRC2012/Images
  img_size: 256
  crop: random

dataloader:
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2

encoder:
  target: models.autoencoder.titok_net.Encoder
  params:
    in_channels: 3
    dim: 512
    n_heads: 8
    n_layers: 8
    n_tokens: 128
    image_size: 256
    patch_size: 16

decoder:
  target: models.autoencoder.titok_net.Decoder
  params:
    out_channels: 3
    dim: 1024
    n_heads: 16
    n_layers: 24
    n_tokens: 128
    image_size: 256
    patch_size: 16

quantizer:
  target: models.quantizer.VectorQuantizer
  params:
    codebook_num: 8192
    codebook_dim: 64
    l2_norm: True

disc:
  target: models.discriminator.TitokGANDiscriminator

train:
  n_steps: 500000
  batch_size: 256
  micro_batch_size: ~

  type_rec: l2
  coef_rec: 1.00
  type_lpips: convnext_s
  coef_lpips: 0.10
  coef_commit: 0.25
  coef_vq: 1.00
  coef_adv: 0.50  # TODO
  start_adv: 20000
  adaptive_adv_weight: False
  coef_lecam_reg: 0.001

  clip_grad_norm: 1.0

  print_freq: 500
  sample_freq: 10000
  save_freq: 50000

  optim:
    target: torch.optim.AdamW
    params:
      lr: 0.0001
      betas: [0.9, 0.999]
      weight_decay: 0.0001

  optim_d:
    target: torch.optim.AdamW
    params:
      lr: 0.0001
      betas: [0.9, 0.999]
      weight_decay: 0.0001
